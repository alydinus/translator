<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>GT Enhanced — Настройки</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', Roboto, sans-serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 0 24px;
      color: #202124;
      font-size: 15px;
    }
    h1 { font-size: 22px; color: #1a73e8; margin-bottom: 24px; }
    h2 { font-size: 16px; margin-bottom: 12px; color: #3c4043; }
    .section {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    label { display: block; font-size: 13px; color: #5f6368; margin-bottom: 6px; }
    input[type="text"], input[type="password"], select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 14px;
      color: #202124;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus, select:focus { border-color: #1a73e8; }
    .btn-primary {
      padding: 9px 22px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-primary:hover { background: #1557b0; }
    .status {
      margin-top: 10px;
      font-size: 13px;
      min-height: 18px;
      color: #188038;
    }
    .hint {
      font-size: 12px;
      color: #9aa0a6;
      margin-top: 4px;
      line-height: 1.5;
    }
    code {
      background: #f1f3f4;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>⚙ Настройки GT Enhanced</h1>

  <div class="section">
    <h2>Google Translation API</h2>
    <label for="api-key">API Ключ</label>
    <input type="password" id="api-key" placeholder="AIza...">
    <p class="hint">
      Получить: Google Cloud Console → APIs &amp; Services → Cloud Translation API → Credentials.<br>
      Ограничьте ключ по HTTP referrer: <code>chrome-extension://YOUR_EXTENSION_ID/*</code>
    </p>
    <button class="btn-primary" id="btn-save-key">Сохранить ключ</button>
    <div class="status" id="status-key"></div>
  </div>

  <div class="section">
    <h2>Язык перевода по умолчанию</h2>
    <label for="default-lang">Целевой язык</label>
    <select id="default-lang">
      <option value="ru">Русский (ru)</option>
      <option value="en">English (en)</option>
      <option value="de">Deutsch (de)</option>
      <option value="fr">Français (fr)</option>
      <option value="es">Español (es)</option>
    </select>
    <button class="btn-primary" id="btn-save-lang">Сохранить</button>
    <div class="status" id="status-lang"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
